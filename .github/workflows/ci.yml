name: L'intégration continue
permissions: {}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Validation du code de notre application antivirus

    runs-on: ubuntu-latest

    steps:
      - name: Cloner le dépôt Git
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Pre-construction de l'environnement de développement
        run: nix-build --attr shell

      - name: Valide le formattage du code
        run: nix-shell --run "treefmt"

      - name: Valide le comportement du code
        run: nix-shell --run "bash_unit tests/*.test.sh"
